on:
  push:
    tags:
      - "v[0-9].[0-9]+.[0-9]+" # Push events to matching sematic versioning, i.e. v1.0, v20.15.10

permissions: {}

jobs:
  create_release:
    if: github.repository_owner == 'unitaryfoundation'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out Mitiq
        uses: actions/checkout@v6
      - name: Extract release notes of latest version
        run: |
          awk '/^## Version /{if(found) exit; found=1} found{print}' CHANGELOG.md > release_notes.md
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # This token is provided by Actions, you do not need to create your own token
        with:
          tag_name: ${{ github.ref }}
          release_name: ${{ github.ref }}
          body_path: ./release_notes.md
          draft: true
          prerelease: false
